name: Deploy Blixamo

on:
  push:
    branches:
      - master

concurrency:
  group: blixamo-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 77.42.17.13 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@77.42.17.13 \
            "chmod +x /var/www/blixamo/deploy.sh && bash /var/www/blixamo/deploy.sh"

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://blixamo.com/)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check FAILED with status $STATUS"
            exit 1
          fi
          echo "Site is live and healthy"
