name: Auto Deploy to VPS

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 204.168.203.255
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /var/www/blixamo

            echo "=== [1/5] Syncing exact GitHub commit ==="
            git fetch origin
            git reset --hard origin/master
            git clean -fd

            echo "=== [2/5] Installing dependencies ==="
            npm install --frozen-lockfile

            echo "=== [3/5] Building (fails here = no deploy) ==="
            npm run build

            echo "=== [4/5] Reloading PM2 ==="
            pm2 reload blixamo

            echo "=== [5/5] Health check ==="
            sleep 3
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Site is live — HTTP $STATUS"
            else
              echo "❌ Health check failed — HTTP $STATUS"
              echo "Rolling back..."
              git stash
              npm run build
              pm2 reload blixamo
              exit 1
            fi
