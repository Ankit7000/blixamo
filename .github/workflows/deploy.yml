name: Deploy to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.BLIXAMO_SSH_KEY }}" > ~/.ssh/blixamo_actions
          chmod 600 ~/.ssh/blixamo_actions
          ssh-keyscan -p 22 -H 204.168.203.255 >> ~/.ssh/known_hosts

      - name: Test SSH connection
        shell: bash
        run: |
          ssh -v -i ~/.ssh/blixamo_actions \
            -o IdentitiesOnly=yes \
            -p 22 \
            bot@204.168.203.255 \
            "echo SSH_OK && whoami && hostname"

      - name: Deploy on VPS
        shell: bash
        run: |
          ssh -i ~/.ssh/blixamo_actions \
            -o IdentitiesOnly=yes \
            -p 22 \
            bot@204.168.203.255 \
            "bash /var/www/blixamo/build.sh"
