name: Deploy Blixamo

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: blixamo-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      SSH_HOST: ${{ secrets.BLIXAMO_SSH_HOST }}
      SSH_PORT: ${{ secrets.BLIXAMO_SSH_PORT }}
      SSH_USER: ${{ secrets.BLIXAMO_SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.BLIXAMO_SSH_KEY }}

    steps:
      - name: Validate required secrets
        run: |
          set -euo pipefail
          for secret_name in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY; do
            if [ -z "${!secret_name:-}" ]; then
              echo "Missing required secret: $secret_name" >&2
              exit 1
            fi
          done

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Verify ads.txt source file
        run: |
          set -euo pipefail
          node scripts/validate-ads-txt.js

      - name: Run production deploy
        run: |
          set -euo pipefail
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "bash /var/www/blixamo/build.sh"

      - name: Verify live ads.txt
        run: |
          set -euo pipefail
          node scripts/verify-production-ads-txt.js
