name: Auto Deploy to VPS

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 77.42.17.13
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/blixamo
            git pull origin master
            npm install --frozen-lockfile
            npm run build
            pm2 reload blixamo
            echo "✅ Deployed successfully!"
