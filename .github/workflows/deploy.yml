
name: Deploy to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.BLIXAMO_SSH_KEY }}" > ~/.ssh/blixamo_bot
          chmod 600 ~/.ssh/blixamo_bot
          ssh-keyscan -p "${{ secrets.BLIXAMO_SSH_PORT }}" -H "${{ secrets.BLIXAMO_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        shell: bash
        run: |
          ssh -v -i ~/.ssh/blixamo_bot \
            -p "${{ secrets.BLIXAMO_SSH_PORT }}" \
            "${{ secrets.BLIXAMO_SSH_USER }}@${{ secrets.BLIXAMO_SSH_HOST }}" \
            "echo SSH_OK && whoami && hostname"

      - name: Deploy on VPS
        shell: bash
        run: |
          ssh -i ~/.ssh/blixamo_bot \
            -p "${{ secrets.BLIXAMO_SSH_PORT }}" \
            "${{ secrets.BLIXAMO_SSH_USER }}@${{ secrets.BLIXAMO_SSH_HOST }}" \
            "bash /var/www/blixamo/build.sh"
