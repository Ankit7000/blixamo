name: Deploy Blixamo

on:
  push:
    branches:
      - master

concurrency:
  group: blixamo-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger webhook deploy
        run: |
          PAYLOAD='{"ref":"master"}'
          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "blixamo-deploy-secret" | sed 's/.*= //')
          curl --fail --silent --show-error \
            -X POST https://blixamo.com/deploy \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$PAYLOAD"

      - name: Wait for build
        run: sleep 45

      - name: Health check
        run: |
          curl --fail --silent --show-error https://blixamo.com/ > /dev/null
          echo "Site is live"
