name: Deploy Blixamo

on:
  push:
    branches:
      - master

concurrency:
  group: blixamo-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BLIXAMO_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 204.168.203.255 >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 bot@204.168.203.255 "bash /var/www/blixamo/build.sh"

      - name: Health check
        run: |
          curl --fail --silent --show-error https://blixamo.com/ > /dev/null
