name: Deploy to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BLIXAMO_SSH_HOST }}
          username: ${{ secrets.BLIXAMO_SSH_USER }}
          port: ${{ secrets.BLIXAMO_SSH_PORT }}
          key: ${{ secrets.BLIXAMO_SSH_KEY }}
          script_stop: true
          script: |
            bash /var/www/blixamo/build.sh
