server {
    server_name blixamo.com;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml application/font-woff2;
    gzip_min_length 1000;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Next.js static chunks - immutable forever, hide Next.js header to avoid duplicates
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header CDN-Cache-Control "public, max-age=31536000, immutable";
    }

    # Public images - 30 day cache, hide Next.js header to avoid duplicates
    location /images/ {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=2592000";
        add_header CDN-Cache-Control "public, max-age=2592000";
    }

    # HTML pages - no CDN cache so Next.js ISR revalidation works correctly
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, s-maxage=0, must-revalidate";
        add_header CDN-Cache-Control "no-store";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/blixamo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blixamo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    server_name www.blixamo.com;
    return 301 https://blixamo.com$request_uri;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/blixamo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blixamo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name blixamo.com www.blixamo.com;
    return 301 https://blixamo.com$request_uri;
}
