<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Blixamo logo</title>
  <desc id="desc">Stylized Blixamo wordmark on a dark background.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141824" />
      <stop offset="100%" stop-color="#0b1020" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff" />
      <stop offset="100%" stop-color="#8e86ff" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  <rect x="48" y="48" width="416" height="416" rx="96" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8" />
  <text x="64" y="286" font-family="Inter, Arial, sans-serif" font-size="122" font-weight="800" fill="url(#accent)">blix</text>
  <text x="270" y="286" font-family="Inter, Arial, sans-serif" font-size="122" font-weight="800" fill="#f4f7ff">amo</text>
  <circle cx="98" cy="132" r="18" fill="#6c63ff" opacity="0.9" />
</svg>
